<!DOCTYPE html>
<html>
<head>
    <title>Bunny Video Fetcher</title>
</head>
<body>
    <div id="output">Fetching...</div>
    <script>
        const apiKey = '164b15f1-6c56-48bc-83c0c18ef9b1-ba72-4695';
        const libraryId = '621910';
        
        fetch(`https://video.bunnycdn.com/library/${libraryId}/videos?page=1&itemsPerPage=100&orderBy=date`, {
            method: 'GET',
            headers: {
                'AccessKey': apiKey,
                'accept': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('output').innerText = JSON.stringify(data, null, 2);
        })
        .catch(error => {
            document.getElementById('output').innerText = 'Error: ' + error.message;
        });
    </script>
</body>
</html>
